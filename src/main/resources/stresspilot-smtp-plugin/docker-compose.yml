services:
  # Instance 1: No Authentication (MailHog)
  mailhog:
    image: mailhog/mailhog
    container_name: stresspilot-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI

  # Instance 2: Authentication & Multi-protocol (smtp4dev)
  # Supports SMTP Auth, and IMAP for verification
  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: stresspilot-smtp4dev
    ports:
      - "3025:25"   # SMTP
      - "3143:143"  # IMAP
      - "7080:80"   # Web UI
    environment:
      - ServerOptions__HostName=0.0.0.0
      - RelayOptions__Enabled=false
      - AuthenticationOptions__Enabled=true
      - AuthenticationOptions__Credentials=admin:password
