services:
  # Instance 1: No Authentication (MailHog)
  mailhog:
    image: mailhog/mailhog
    container_name: stresspilot-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI

  # Instance 2: Authentication & Multi-protocol (GreenMail)
  # Supports SMTP Auth, SSL, and IMAP for verification
  greenmail:
    image: greenmail/standalone:2.1.0
    container_name: stresspilot-greenmail
    ports:
      - "3025:3025" # SMTP
      - "3143:3143" # IMAP
      - "3465:3465" # SMTPS (SSL)
      - "3993:3993" # IMAPS (SSL)
      - "7080:7080" # API / UI (if enabled)
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.users=admin:password@stresspilot.dev -Dgreenmail.auth.disabled=false
